<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Market Pulse — Live Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --accent: #58a6ff;
    --yellow: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 { font-size: 1.6rem; margin-bottom: 4px; }
  .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card h2 { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .price-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .price-row:last-child { border-bottom: none; }
  .asset-name { font-weight: 500; }
  .asset-price { font-family: 'SF Mono', 'Consolas', monospace; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral { color: var(--yellow); }
  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  .error { color: var(--red); padding: 8px 0; font-size: 0.85rem; }
  .last-updated { text-align: right; font-size: 0.75rem; color: var(--text-dim); margin-top: 16px; }
  button {
    background: var(--accent); color: #0d1117; border: none;
    padding: 8px 16px; border-radius: 6px; font-weight: 600;
    cursor: pointer; font-size: 0.85rem;
  }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--border); color: var(--text); }
  .flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .fng-value { font-size: 2rem; font-weight: 700; text-align: center; }
  .fng-label { text-align: center; font-size: 0.85rem; color: var(--text-dim); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
  }
  .badge-bull { background: #1b3a2b; color: var(--green); }
  .badge-bear { background: #3a1b1b; color: var(--red); }
  .badge-neutral { background: #2a2a1b; color: var(--yellow); }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="flex">
  <div>
    <h1>📊 Market Pulse</h1>
    <div class="subtitle">Live crypto &amp; market overview — refreshes every 2 min</div>
  </div>
  <div>
    <button onclick="refreshAll()">🔄 Refresh</button>
    <button class="secondary" onclick="toggleAuto()" id="autoBtn">⏸ Pause Auto</button>
  </div>
</div>

<div class="grid">
  <div class="card" id="crypto-card">
    <h2>🪙 Crypto</h2>
    <div id="crypto-loading" class="loading">Loading...</div>
    <div id="crypto-data" style="display:none"></div>
  </div>
  <div class="card" id="market-card">
    <h2>🌐 Market</h2>
    <div id="market-loading" class="loading">Loading...</div>
    <div id="market-data" style="display:none"></div>
  </div>
  <div class="card" id="fng-card">
    <h2>😨 Fear &amp; Greed</h2>
    <div id="fng-loading" class="loading">Loading...</div>
    <div id="fng-data" style="display:none"></div>
  </div>
  <div class="card" id="stocks-card">
    <h2>🏛️ Stocks</h2>
    <div id="stocks-loading" class="loading">Loading...</div>
    <div id="stocks-data" style="display:none"></div>
  </div>
</div>

<div class="grid" id="extraGrid" style="display:none">
  <div class="card card-wide" id="polymarket-card">
    <h2>🎯 Prediction Markets (Polymarket)</h2>
    <div id="polymarket-loading" class="loading">Loading...</div>
    <div id="polymarket-data" style="display:none"></div>
  </div>
</div>

<div class="last-updated" id="lastUpdated">Last updated: —</div>

<div style="text-align:center;margin-top:20px;font-size:0.75rem;color:var(--text-dim)">
  Data: CoinGecko &middot; alternative.me &middot; Polymarket |
  <a href="https://github.com" target="_blank">View on GitHub</a>
</div>

<script>
(function() {
var REFRESH_INTERVAL = 120000;
var autoRefresh = true;
var timer = null;
var $ = function(id) { return document.getElementById(id); };

function hasPolymarketProxy() {
  return window.location.pathname === '/' || window.location.pathname === '/index.html';
}

function fmtPrice(n) {
  if (n == null) return '&mdash;';
  if (n >= 1000) return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
  if (n >= 1) return '$' + n.toFixed(2);
  return '$' + n.toFixed(4);
}

function fmtChange(pct) {
  if (pct == null) return '<span class="neutral">&mdash;</span>';
  var cls = pct >= 0 ? 'positive' : 'negative';
  var sign = pct >= 0 ? '+' : '';
  return '<span class="' + cls + '">' + sign + pct.toFixed(2) + '%</span>';
}

function updateTS() {
  $('lastUpdated').textContent = 'Last updated: ' + new Date().toISOString().slice(11,19) + ' UTC';
}

async function fetchJSON(url) {
  var resp = await fetch(url, {signal: AbortSignal.timeout(10000)});
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}

async function loadCrypto() {
  try {
    var c = await fetchJSON('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,cardano,polkadot,chainlink&vs_currencies=usd&include_24hr_change=true');
    var syms = [
      {n:'BTC',k:'bitcoin'},{n:'ETH',k:'ethereum'},{n:'SOL',k:'solana'},
      {n:'XRP',k:'ripple'},{n:'ADA',k:'cardano'},{n:'DOT',k:'polkadot'},
      {n:'LINK',k:'chainlink'}
    ];
    var html = '';
    for (var i = 0; i < syms.length; i++) {
      var s = syms[i];
      var coin = c[s.k];
      html += '<div class="price-row"><span class="asset-name">' + s.n + '</span><span><span class="asset-price">' + fmtPrice(coin && coin.usd) + '</span> ' + fmtChange(coin && coin.usd_24h_change) + '</span></div>';
    }
    $('crypto-data').innerHTML = html;
    $('crypto-loading').style.display = 'none';
    $('crypto-data').style.display = '';
  } catch(e) {
    $('crypto-loading').innerHTML = '<div class="error">⚠️ ' + e.message + '</div>';
  }
}

async function loadMarket() {
  try {
    var g = await fetchJSON('https://api.coingecko.com/api/v3/global');
    var d = g.data;
    var html = '';
    html += '<div class="price-row"><span>Market Cap</span><span class="asset-price">' + fmtPrice(d.total_market_cap && d.total_market_cap.usd) + '</span></div>';
    html += '<div class="price-row"><span>24h Volume</span><span class="asset-price">' + fmtPrice(d.total_volume && d.total_volume.usd) + '</span></div>';
    html += '<div class="price-row"><span>BTC Dom</span><span class="asset-price">' + (d.market_cap_percentage && d.market_cap_percentage.btc ? d.market_cap_percentage.btc.toFixed(1) : '?') + '%</span></div>';
    html += '<div class="price-row"><span>ETH Dom</span><span class="asset-price">' + (d.market_cap_percentage && d.market_cap_percentage.eth ? d.market_cap_percentage.eth.toFixed(1) : '?') + '%</span></div>';
    html += '<div class="price-row"><span>Active Coins</span><span class="asset-price">' + (d.active_cryptocurrencies ? d.active_cryptocurrencies.toLocaleString() : '?') + '</span></div>';
    $('market-data').innerHTML = html;
    $('market-loading').style.display = 'none';
    $('market-data').style.display = '';
  } catch(e) {
    $('market-loading').innerHTML = '<div class="error">⚠️ ' + e.message + '</div>';
  }
}

async function loadFNG() {
  try {
    var fng = await fetchJSON('https://api.alternative.me/fng/?limit=8');
    var item = fng.data && fng.data[0];
    if (!item) throw new Error('No data');
    var val = parseInt(item.value);
    var label = item.value_classification || 'Neutral';
    var cls = 'badge-neutral';
    if (val >= 55) cls = 'badge-bull';
    else if (val <= 45) cls = 'badge-bear';
    var pct = Math.min(Math.max(val, 0), 100);
    var barColor = val >= 55 ? 'var(--green)' : val <= 45 ? 'var(--red)' : 'var(--yellow)';
    var html = '<div class="fng-value">' + val + '</div>';
    html += '<div class="fng-label"><span class="badge ' + cls + '">' + label + '</span></div>';
    html += '<div style="margin-top:12px"><div style="background:var(--border);border-radius:4px;height:8px;margin-bottom:12px"><div style="background:' + barColor + ';width:' + pct + '%;height:8px;border-radius:4px;transition:width 0.5s"></div></div></div>';
    html += '<div style="font-size:0.75rem;color:var(--text-dim)">History:</div>';
    for (var i = 1; i < fng.data.length; i++) {
      var h = fng.data[i];
      var d = h.timestamp ? new Date(parseInt(h.timestamp)*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '?';
      html += '<div class="price-row" style="font-size:0.8rem"><span>' + d + '</span><span>' + h.value + ' &mdash; ' + (h.value_classification||'') + '</span></div>';
    }
    $('fng-data').innerHTML = html;
    $('fng-loading').style.display = 'none';
    $('fng-data').style.display = '';
  } catch(e) {
    $('fng-loading').innerHTML = '<div class="error">⚠️ ' + e.message + '</div>';
  }
}

async function loadStocks() {
  try {
    var html = '';
    html += '<div class="price-row"><span>SPY</span><span class="asset-price">' + fmtChange(null) + '</span></div>';
    html += '<div class="price-row"><span>QQQ</span><span class="asset-price">' + fmtChange(null) + '</span></div>';
    html += '<div class="price-row"><span>VIX</span><span class="asset-price">' + fmtChange(null) + '</span></div>';
    html += '<div style="margin-top:12px;font-size:0.75rem;color:var(--text-dim);text-align:center">📈 Need API key for stocks.<br>Run <code>market-pulse-server.py</code> for Polymarket data.</div>';
    $('stocks-data').innerHTML = html;
    $('stocks-loading').style.display = 'none';
    $('stocks-data').style.display = '';
  } catch(e) {
    $('stocks-loading').innerHTML = '<div class="error">⚠️ ' + e.message + '</div>';
  }
}

async function loadPolymarket() {
  if (!hasPolymarketProxy()) return;
  $('extraGrid').style.display = '';
  try {
    var data = await fetchJSON('/api/polymarket/events/keyset?limit=6&closed=false&tag=all');
    var events = data.events || [];
    var html = '';
    var count = 0;
    for (var ei = 0; ei < events.length && count < 6; ei++) {
      var evt = events[ei];
      var title = evt.title || 'Market';
      var markets = evt.markets || [];
      for (var mi = 0; mi < markets.length && count < 6; mi++) {
        var m = markets[mi];
        if (m.closed) continue;
        var prices = m.outcomePrices || '[0.5]';
        var yesPct = 50;
        try {
          var parsed = JSON.parse(prices);
          yesPct = parseFloat(parsed[0]) * 100;
        } catch(e) { yesPct = 50; }
        yesPct = Math.round(yesPct * 10) / 10;
        var vol = m.volumeNum || m.volume || 0;
        vol = parseFloat(vol);
        html += '<div class="price-row">';
        html += '  <span style="font-size:0.8rem;flex:1">' + (title.length > 45 ? title.slice(0,45)+'&hellip;' : title) + '</span>';
        html += '  <span style="text-align:right;margin-left:8px;white-space:nowrap">';
        html += '    <span style="font-family:monospace;font-size:0.9rem">' + yesPct.toFixed(1) + '%</span>';
        html += '    <span style="font-size:0.7rem;color:var(--text-dim);display:block">$' + (vol/1e6).toFixed(1) + 'M</span>';
        html += '  </span>';
        html += '</div>';
        count++;
      }
    }
    if (count === 0) {
      html = '<div style="text-align:center;padding:12px;color:var(--text-dim)">No active markets found</div>';
    }
    $('polymarket-data').innerHTML = html;
    $('polymarket-loading').style.display = 'none';
    $('polymarket-data').style.display = '';
  } catch(e) {
    $('polymarket-loading').innerHTML = '<div class="error">⚠️ ' + e.message + '</div>';
  }
}

async function refreshAll() {
  await Promise.allSettled([loadCrypto(), loadMarket(), loadFNG(), loadStocks(), loadPolymarket()]);
  updateTS();
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  $('autoBtn').textContent = autoRefresh ? '⏸ Pause Auto' : '▶ Resume Auto';
  if (autoRefresh) { scheduleRefresh(); refreshAll(); }
  else if (timer) { clearTimeout(timer); timer = null; }
}

function scheduleRefresh() {
  if (timer) clearTimeout(timer);
  if (!autoRefresh) return;
  timer = setTimeout(function() { refreshAll().then(scheduleRefresh); }, REFRESH_INTERVAL);
}

refreshAll();
scheduleRefresh();
})();
</script>
</body>
</html>
